<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AFT Triple Challenge 2026</title>
    <style>
        :root {
            --primary: #d32f2f;
            --dark: #121212;
            --card-bg: #1e1e1e;
            --stripe: #252525;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Layout Structure */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            padding-right: 85px; /* Space for fixed sidebar */
        }
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 75px;
            background: #000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 5px;
            border-left: 1px solid #333;
            justify-content: center;
        }

        /* Rider Cards */
        .rider-card {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 4px;
            border-left: 3px solid #444;
        }
        .rider-card:nth-child(even) { background: var(--stripe); }
        
        .rider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .rider-name-select {
            width: 65%;
            font-size: 0.9rem;
            background: #333;
            color: white;
            border: none;
            padding: 4px;
        }
        .live-points {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.9rem;
            background: rgba(211, 47, 47, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Small Select Boxes */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }
        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: #888;
            text-align: center;
            margin-bottom: 2px;
        }
        select.pos-input {
            width: 100%;
            padding: 6px 2px;
            font-size: 0.85rem;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
        }

        /* Standings Styling */
        .results-area { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .res-row {
            display: flex;
            justify-content: space-between;
            padding: 6px;
            margin-bottom: 2px;
            border-radius: 4px;
            font-size: 0.85rem;
            background: #222;
        }
        .res-row.gold { border-left: 4px solid var(--gold); background: rgba(255, 215, 0, 0.1); }
        .res-row.silver { border-left: 4px solid var(--silver); background: rgba(192, 192, 192, 0.1); }
        .res-row.bronze { border-left: 4px solid var(--bronze); background: rgba(205, 127, 50, 0.1); }

        /* Buttons */
        .side-btn {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 15px 5px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .calc-btn { background: var(--primary); color: white; flex: 2; }
        .reset-btn { background: #444; color: #ccc; flex: 1; }
    </style>
</head>
<body>

<div class="main-content">
    <div id="riderInputs"></div>
    <div id="results" class="results-area"></div>
</div>

<div class="sidebar">
    <button class="side-btn calc-btn" onclick="calculateResults()">CALCULATE</button>
    <button class="side-btn reset-btn" onclick="resetAll()">RESET</button>
</div>

<script>
    const riders = [
        "Kody Kopp", "Dallas Daniels", "Davis Fisher", "Henry Wiles", 
        "Brandon Robinson", "Sammy Halbert", "Briar Bauman", "Trent Lowe", 
        "Ben Lowe", "Dan Bromley", "Dalton Gauthier", "Logan Mcgrane", 
        "Aidan RoosEvans", "Brandon Price", "Evan Renshaw", "Chad Cose", 
        "Billy Ross", "Cameron Smith", "Hunter Bauer", "Declan Bender"
    ];

    const basePoints = {
        1: 23, 2: 19, 3: 16, 4: 14, 5: 13, 6: 12, 7: 11, 8: 10, 
        9: 9, 10: 8, 11: 7, 12: 6, 13: 5, 14: 4, 15: 3, 16: 2, 17: 1
    };

    function init() {
        const container = document.getElementById('riderInputs');
        for (let i = 1; i <= 5; i++) {
            container.innerHTML += `
                <div class="rider-card">
                    <div class="rider-header">
                        <select class="rider-name-select" id="rider-${i}">
                            <option value="">Rider ${i}...</option>
                            ${riders.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                        <span class="live-points" id="live-${i}">0 pts</span>
                    </div>
                    <div class="grid">
                        <div class="input-group">
                            <label>R1 (1x)</label>
                            <select class="pos-input" id="r1-${i}" onchange="updateLive(${i})">${getOptions()}</select>
                        </div>
                        <div class="input-group">
                            <label>R2 (2x)</label>
                            <select class="pos-input" id="r2-${i}" onchange="updateLive(${i})">${getOptions()}</select>
                        </div>
                        <div class="input-group">
                            <label>R3 (3x)</label>
                            <select class="pos-input" id="r3-${i}" onchange="updateLive(${i})">${getOptions()}</select>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    function getOptions() {
        let options = '<option value="0">-</option>';
        for (let i = 1; i <= 17; i++) options += `<option value="${i}">${i}</option>`;
        return options;
    }

    function updateLive(id) {
        const p1 = parseInt(document.getElementById(`r1-${id}`).value);
        const p2 = parseInt(document.getElementById(`r2-${id}`).value);
        const p3 = parseInt(document.getElementById(`r3-${id}`).value);
        const total = (basePoints[p1] || 0) + ((basePoints[p2] || 0) * 2) + ((basePoints[p3] || 0) * 3);
        document.getElementById(`live-${id}`).innerText = `${total} pts`;
    }

    function calculateResults() {
        let results = [];
        for (let i = 1; i <= 5; i++) {
            const name = document.getElementById(`rider-${i}`).value;
            if (!name) continue;
            const p1 = parseInt(document.getElementById(`r1-${i}`).value);
            const p2 = parseInt(document.getElementById(`r2-${i}`).value);
            const p3 = parseInt(document.getElementById(`r3-${i}`).value);
            results.push({
                name: name,
                total: (basePoints[p1] || 0) + ((basePoints[p2] || 0) * 2) + ((basePoints[p3] || 0) * 3),
                r3Finish: p3 === 0 ? 99 : p3
            });
        }

        results.sort((a, b) => b.total !== a.total ? b.total - a.total : a.r3Finish - b.r3Finish);

        const resDiv = document.getElementById('results');
        let html = '<h4 style="margin:0 0 10px 0; font-size:0.8rem; color:#888;">STANDINGS</h4>';
        results.forEach((r, idx) => {
            let medalClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
            html += `
                <div class="res-row ${medalClass}">
                    <span><strong>#${idx+1}</strong> ${r.name}</span>
                    <span>${r.total} <small style="font-size:0.6rem; color:#666">pts</small></span>
                </div>`;
        });
        resDiv.innerHTML = html;
    }

    function resetAll() {
        if(confirm("Clear all data?")) {
            document.querySelectorAll('select').forEach(s => s.value = s.className.includes('rider') ? "" : "0");
            document.querySelectorAll('.live-points').forEach(s => s.innerText = "0 pts");
            document.getElementById('results').innerHTML = "";
        }
    }

    init();
</script>
</body>
</html>

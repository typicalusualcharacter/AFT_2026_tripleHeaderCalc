<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AFT Triple Challenge 2026</title>
    <style>
        :root {
            --primary: #d32f2f;
            --dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --stripe: #222;
            --gold: #FFD700;
            --silver: #E0E0E0;
            --bronze: #CD7F32;
            --text-gold: #000; /* Black text on gold for readability */
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            display: flex;
        }
        
        /* Layout Structure */
        .main-content {
            flex: 1;
            padding: 10px;
            padding-right: 70px; /* Space for buttons */
        }
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 65px;
            background: #000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 4px;
            border-left: 1px solid #333;
        }

        /* Rider Cards */
        .rider-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid #333;
        }
        .rider-card:nth-child(even) { background: var(--stripe); }
        
        .rider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .rider-name-select {
            width: 65%;
            font-size: 1.1rem; /* Increased font size */
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
        }
        .live-points {
            font-weight: 800;
            color: #fff;
            font-size: 1rem;
            background: var(--primary);
            padding: 3px 8px;
            border-radius: 4px;
        }

        /* Input Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
            margin-bottom: 3px;
            font-weight: bold;
        }
        select.pos-input {
            width: 100%;
            padding: 8px 2px;
            font-size: 1.1rem; /* Increased font size for readability */
            background: #2a2a2a;
            color: white;
            border: 2px solid #444;
            border-radius: 6px;
            text-align: center;
            transition: all 0.2s;
        }

        /* Dynamic Podium Colors for Inputs */
        .pos-gold { background-color: var(--gold) !important; color: #000 !important; border-color: #fff !important; }
        .pos-silver { background-color: var(--silver) !important; color: #000 !important; border-color: #fff !important; }
        .pos-bronze { background-color: var(--bronze) !important; color: #fff !important; border-color: #fff !important; }

        /* Standings Results Styling */
        .results-area { margin-top: 20px; border-top: 2px solid #333; padding-top: 15px; }
        .res-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 4px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            background: #222;
        }
        .res-row.gold { background: var(--gold); color: #000; border: 2px solid #fff; }
        .res-row.silver { background: var(--silver); color: #000; border: 2px solid #fff; }
        .res-row.bronze { background: var(--bronze); color: #fff; border: 2px solid #fff; }

        /* Buttons - Horizontal Text, Small Size */
        .side-btn {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.65rem; /* Smaller text to fit horizontal */
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2px;
        }
        .calc-btn { background: #2e7d32; color: white; border-bottom: 4px solid #1b5e20; }
        .reset-btn { background: #d32f2f; color: white; border-bottom: 4px solid #b71c1c; }
    </style>
</head>
<body>

<div class="main-content">
    <div id="riderInputs"></div>
    <div id="results" class="results-area"></div>
</div>

<div class="sidebar">
    <button class="side-btn calc-btn" onclick="calculateResults()">CALC<br>SCORES</button>
    <button class="side-btn reset-btn" onclick="resetAll()">RESET<br>ALL</button>
</div>

<script>
    const riders = ["Kody Kopp", "Dallas Daniels", "Davis Fisher", "Henry Wiles", "Brandon Robinson", "Sammy Halbert", "Briar Bauman", "Trent Lowe", "Ben Lowe", "Dan Bromley", "Dalton Gauthier", "Logan Mcgrane", "Aidan RoosEvans", "Brandon Price", "Evan Renshaw", "Chad Cose", "Billy Ross", "Cameron Smith", "Hunter Bauer", "Declan Bender"];
    const basePoints = { 1: 23, 2: 19, 3: 16, 4: 14, 5: 13, 6: 12, 7: 11, 8: 10, 9: 9, 10: 8, 11: 7, 12: 6, 13: 5, 14: 4, 15: 3, 16: 2, 17: 1 };

    function init() {
        const container = document.getElementById('riderInputs');
        for (let i = 1; i <= 5; i++) {
            container.innerHTML += `
                <div class="rider-card">
                    <div class="rider-header">
                        <select class="rider-name-select" id="rider-${i}">
                            <option value="">Rider ${i}...</option>
                            ${riders.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                        <span class="live-points" id="live-${i}">0 pts</span>
                    </div>
                    <div class="grid">
                        ${[1, 2, 3].map(raceNum => `
                            <div class="input-group">
                                <label>RACE ${raceNum}</label>
                                <select class="pos-input" id="r${raceNum}-${i}" onchange="updateLive(${i}, this)">
                                    <option value="0">-</option>
                                    ${Array.from({length: 17}, (_, idx) => `<option value="${idx+1}">${idx+1}</option>`).join('')}
                                </select>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    }

    function updateLive(id, element) {
        // Handle Coloring of the select box
        element.classList.remove('pos-gold', 'pos-silver', 'pos-bronze');
        if (element.value == "1") element.classList.add('pos-gold');
        if (element.value == "2") element.classList.add('pos-silver');
        if (element.value == "3") element.classList.add('pos-bronze');

        const p1 = parseInt(document.getElementById(`r1-${id}`).value);
        const p2 = parseInt(document.getElementById(`r2-${id}`).value);
        const p3 = parseInt(document.getElementById(`r3-${id}`).value);
        const total = (basePoints[p1] || 0) + ((basePoints[p2] || 0) * 2) + ((basePoints[p3] || 0) * 3);
        document.getElementById(`live-${id}`).innerText = `${total} pts`;
    }

    function calculateResults() {
        let results = [];
        for (let i = 1; i <= 5; i++) {
            const name = document.getElementById(`rider-${i}`).value;
            if (!name) continue;
            const p1 = parseInt(document.getElementById(`r1-${i}`).value);
            const p2 = parseInt(document.getElementById(`r2-${i}`).value);
            const p3 = parseInt(document.getElementById(`r3-${i}`).value);
            results.push({
                name: name,
                total: (basePoints[p1] || 0) + ((basePoints[p2] || 0) * 2) + ((basePoints[p3] || 0) * 3),
                r3Finish: p3 === 0 ? 99 : p3
            });
        }
        results.sort((a, b) => b.total !== a.total ? b.total - a.total : a.r3Finish - b.r3Finish);

        const resDiv = document.getElementById('results');
        let html = '<h3 style="text-align:center; color:var(--gold); margin:0 0 10px 0;">FINAL STANDINGS</h3>';
        results.forEach((r, idx) => {
            let medalClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
            html += `<div class="res-row ${medalClass}"><span>${idx+1}. ${r.name}</span><span>${r.total} pts</span></div>`;
        });
        resDiv.innerHTML = html;
        resDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function resetAll() {
        if(confirm("Clear all data?")) {
            location.reload(); // Simple way to reset everything perfectly
        }
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://www.americanflattrack.com/themes/amaproracing/assets/images/logos/progressive-logo.png">
    <title>AFT TripChallenge Calc 2026</title>
    <style>
        :root {
            --primary: #d32f2f;
            --dark: #050505;
            --card-odd: #1a1a1a;
            --card-even: #252525;
            --gold: #FFD700;
            --silver: #E0E0E0;
            --bronze: #CD7F32;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            display: flex;
        }
        
        .main-content {
            flex: 1;
            padding: 10px;
            padding-right: 75px; 
        }

        .header-logo {
            display: block;
            margin: 10px auto 20px auto;
            max-width: 270px; /* 1.5x scale */
            height: auto;
        }

        .sidebar {
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: 70px;
            background: #000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 5px;
            border-left: 1px solid #333;
            z-index: 100;
        }

        .rider-card {
            border-radius: 8px;
            padding: 12px 10px;
            margin-bottom: 6px;
            border: 1px solid #333;
        }
        .rider-card:nth-child(odd) { background: var(--card-odd); }
        .rider-card:nth-child(even) { background: var(--card-even); border-left: 4px solid #444; }
        
        .rider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .rider-name-select {
            width: 68%;
            font-size: 1.1rem;
            font-weight: bold;
            background: #000;
            color: white;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
        }
        .live-points {
            font-weight: 900;
            color: #fff;
            font-size: 1rem;
            background: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: #ccc;
            text-align: center;
            margin-bottom: 4px;
            font-weight: bold;
        }
        select.pos-input {
            width: 100%;
            padding: 10px 2px;
            font-size: 1.2rem;
            background: #333;
            color: white;
            border: 2px solid #555;
            border-radius: 6px;
            text-align: center;
        }

        .pos-gold { background-color: var(--gold) !important; color: #000 !important; font-weight: bold; }
        .pos-silver { background-color: var(--silver) !important; color: #000 !important; font-weight: bold; }
        .pos-bronze { background-color: var(--bronze) !important; color: #fff !important; font-weight: bold; }

        .results-area { margin-top: 20px; border-top: 3px solid var(--primary); padding-top: 15px; padding-bottom: 40px;}
        .res-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: bold;
        }
        .res-row.gold { background: var(--gold); color: #000; }
        .res-row.silver { background: var(--silver); color: #000; }
        .res-row.bronze { background: var(--bronze); color: #fff; }
        .res-row.standard { background: #333; color: #fff; }

        .side-btn {
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.1;
        }
        .calc-btn { background: #2e7d32; color: white; border-bottom: 5px solid #1b5e20; }
        .reset-btn { background: #b71c1c; color: white; border-bottom: 5px solid #7f0000; }
    </style>
</head>
<body>

<div class="main-content">
    <img src="https://www.americanflattrack.com/themes/amaproracing/assets/images/logos/progressive-logo.png" alt="AFT Logo" class="header-logo">
    <div id="riderInputs"></div>
    <div id="results" class="results-area"></div>
</div>

<div class="sidebar">
    <button class="side-btn calc-btn" onclick="calculateResults()">CALC<br>RANK</button>
    <button class="side-btn reset-btn" onclick="resetAll()">CLR<br>ALL</button>
</div>

<script>
    const riders = ["Kody Kopp", "Dallas Daniels", "Davis Fisher", "Henry Wiles", "Brandon Robinson", "Sammy Halbert", "Briar Bauman", "Trent Lowe", "Ben Lowe", "Dan Bromley", "Dalton Gauthier", "Logan Mcgrane", "Aidan RoosEvans", "Brandon Price", "Evan Renshaw", "Chad Cose", "Billy Ross", "Cameron Smith", "Hunter Bauer", "Declan Bender"];
    const basePoints = { 1: 23, 2: 19, 3: 16, 4: 14, 5: 13, 6: 12, 7: 11, 8: 10, 9: 9, 10: 8, 11: 7, 12: 6, 13: 5, 14: 4, 15: 3, 16: 2, 17: 1 };

    function init() {
        const container = document.getElementById('riderInputs');
        for (let i = 1; i <= 5; i++) {
            container.innerHTML += `
                <div class="rider-card">
                    <div class="rider-header">
                        <select class="rider-name-select" id="rider-${i}">
                            <option value="">SELECT RIDER ${i}</option>
                            ${riders.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                        <span class="live-points" id="live-${i}">0 pts</span>
                    </div>
                    <div class="grid">
                        ${[1, 2, 3].map(raceNum => `
                            <div class="input-group">
                                <label>R${raceNum}</label>
                                <select class="pos-input" id="r${raceNum}-${i}" onchange="updateLive(${i}, this)">
                                    <option value="0">-</option>
                                    ${Array.from({length: 17}, (_, idx) => `<option value="${idx+1}">${idx+1}</option>`).join('')}
                                </select>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    }

    function updateLive(id, element) {
        element.classList.remove('pos-gold', 'pos-silver', 'pos-bronze');
        if (element.value == "1") element.classList.add('pos-gold');
        if (element.value == "2") element.classList.add('pos-silver');
        if (element.value == "3") element.classList.add('pos-bronze');
        const p1 = parseInt(document.getElementById(`r1-${id}`).value);
        const p2 = parseInt(document.getElementById(`r2-${id}`).value);
        const p3 = parseInt(document.getElementById(`r3-${id}`).value);
        const total = (basePoints[p1] || 0) + ((basePoints[p2] || 0) * 2) + ((basePoints[p3] || 0) * 3);
        document.getElementById(`live-${id}`).innerText = `${total} pts`;
    }

    function calculateResults() {
        let results = [];
        for (let i = 1; i <= 5; i++) {
            const name = document.getElementById(`rider-${i}`).value;
            if (!name) continue;
            const r1 = parseInt(document.getElementById(`r1-${i}`).value);
            const r2 = parseInt(document.getElementById(`r2-${i}`).value);
            const r3 = parseInt(document.getElementById(`r3-${i}`).value);
            const score = (basePoints[r1] || 0) + ((basePoints[r2] || 0) * 2) + ((basePoints[r3] || 0) * 3);
            results.push({ name: name, total: score, r3Finish: r3 === 0 ? 99 : r3 });
        }
        results.sort((a, b) => b.total !== a.total ? b.total - a.total : a.r3Finish - b.r3Finish);
        const resDiv = document.getElementById('results');
        let html = '<h3 style="text-align:center; color:white; margin:0 0 10px 0;">OVERALL TRIPLE CHALLENGE RANK</h3>';
        results.forEach((r, idx) => {
            let medalClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : 'standard';
            html += `<div class="res-row ${medalClass}"><span>${idx+1}. ${r.name}</span><span>${r.total} pts</span></div>`;
        });
        resDiv.innerHTML = html;
        resDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function resetAll() { if(confirm("Wipe all data?")) location.reload(); }
    init();
</script>
</body>
</html>

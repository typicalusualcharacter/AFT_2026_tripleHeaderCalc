name: Update Rider List
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install requests beautifulsoup4
      - run: python update_riders.py
      - name: Commit changes
        run: |
          git config --global user.name 'RiderBot'
          git config --global user.email 'bot@github.com'
          git add riders.json
          git commit -m "Automated Rider Update" || exit 0
          git push
